<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
let alturaStr = prompt("Digite sua altura em metros (ex: 1.84 ou 1,84):");
// Troca vírgula por ponto
alturaStr = alturaStr.replace(",", ".");
let altura = parseFloat(alturaStr);

let genero = parseInt(prompt("Digite seu gênero (1 = feminino, 2 = masculino):"));
let pesoIdeal;

if (isNaN(altura) || altura <= 0) {
  alert("Altura inválida! Digite em metros, exemplo: 1.84");
} else {
  if (genero === 1) {
    pesoIdeal = (62.1 * altura) - 44.7;
  } else if (genero === 2) {
    pesoIdeal = (72.7 * altura) - 58;
  } else {
    alert("Código inválido! Use 1 para feminino ou 2 para masculino.");
  }

  if (pesoIdeal !== undefined) {
    alert("Seu peso ideal é: " + pesoIdeal.toFixed(2) + " kg");
  }
}
    </script>
    
</body>
</html>
