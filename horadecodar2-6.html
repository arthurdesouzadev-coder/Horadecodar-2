<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let valores = [];
for (let i = 0; i < 4; i++) {
  valores.push(Number(prompt(`Digite o valor ${i+1}:`)));
}
let primeiro = valores[0];
let ultimo = valores[valores.length - 1];
let maior = Math.max(...valores);

alert(`Primeiro: ${primeiro}, Último: ${ultimo}, Maior: ${maior}`);
    </script>
</body>
</html>
