<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numeros = [];
for (let i = 0; i < 4; i++) {
  let n = Number(prompt(`Digite o número ${i+1} (entre 0 e 10):`));
  if (n > 0 && n < 10) {
    numeros.push(n);
  }
}
let media = numeros.reduce((acc, n) => acc + n, 0) / numeros.length;

if (media > 5) {
  alert("Você passou no teste! Média: " + media);
} else {
  alert("Tente novamente. Média: " + media);
}
    </script>
    
</body>
</html>
