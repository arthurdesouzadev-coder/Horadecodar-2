<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let numeros = [];
for (let i = 0; i < 6; i++) {
  numeros.push(Number(prompt(`Digite o valor ${i+1}:`)));
}
let soma = numeros.reduce((acc, n) => acc + n, 0);
let media = soma / numeros.length;

alert("Valores informados: " + numeros.join(", "));
alert("Média aritmética: " + media);
    </script>
    
</body>
</html>
